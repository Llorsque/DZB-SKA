<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Zilveren Bal Kids 2026 — Startlijst</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:        #0a1628;
    --navy-mid:    #0d1b33;
    --navy-card:   #111e38;
    --navy-col:    #0e1a30;
    --silver:      #b8cce0;
    --silver-dim:  #6a8aaa;
    --silver-bright: #dde8f4;
    --gold:        #f0c040;
    --ice:         #cce4f8;
    --ice-dim:     #6898b8;
    --accent:      #4a8eca;
    --red-baan:    #e84040;
    --geel-baan:   #f0c040;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--navy);
    color: var(--silver-bright);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ══ HEADER ══ */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 7px 18px;
    background: var(--navy-mid);
    border-bottom: 1px solid rgba(200,220,240,0.10);
    flex-shrink: 0;
  }
  .logo-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #dce8f8, #8aaccc, #dce8f8);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', cursive; font-size: 8px; letter-spacing: 0.4px;
    color: var(--navy); text-align: center; line-height: 1.3;
    box-shadow: 0 0 12px rgba(200,212,232,0.2); flex-shrink: 0;
  }
  .header-text { display: flex; flex-direction: column; gap: 0; }
  .header-title { font-family:'Bebas Neue',cursive; font-size:20px; letter-spacing:3px; line-height:1; }
  .header-title span { color: var(--gold); }
  .header-sub { font-size:9px; color:var(--ice-dim); letter-spacing:2px; text-transform:uppercase; }

  .header-nav { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .nav-hint { font-size:9px; color:var(--ice-dim); letter-spacing:1px; }
  .nav-btn {
    width:30px; height:30px;
    border:1px solid rgba(200,212,232,0.18); background:rgba(200,212,232,0.05);
    color:var(--silver); border-radius:6px; cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .nav-btn:hover { background:rgba(200,212,232,0.12); border-color:var(--accent); color:#fff; }
  .nav-btn:disabled { opacity:0.28; cursor:default; }
  .rit-counter { font-family:'Bebas Neue',cursive; font-size:18px; letter-spacing:2px; color:var(--gold); min-width:52px; text-align:center; }

  /* ══ ZOOM CONTROLS ══ */
  .zoom-group {
    display:flex; align-items:center; gap:5px;
    padding-left:12px;
    border-left:1px solid rgba(200,220,240,0.12);
    margin-left:4px;
  }
  .zoom-label { font-size:9px; color:var(--ice-dim); letter-spacing:1px; margin-right:2px; white-space:nowrap; }
  .zoom-btn {
    width:28px; height:28px;
    border:1px solid rgba(200,212,232,0.16); background:rgba(200,212,232,0.05);
    color:var(--silver); border-radius:5px; cursor:pointer; font-size:14px; font-weight:600;
    display:flex; align-items:center; justify-content:center; transition:all 0.15s;
    line-height:1;
  }
  .zoom-btn:hover { background:rgba(200,212,232,0.12); border-color:var(--accent); color:#fff; }
  .zoom-pct { font-family:'Bebas Neue',cursive; font-size:15px; color:var(--silver); min-width:38px; text-align:center; letter-spacing:1px; }
  .zoom-presets { display:flex; gap:3px; }
  .zoom-preset {
    font-size:8.5px; padding:2px 6px; border-radius:4px; cursor:pointer; letter-spacing:0.5px;
    border:1px solid rgba(200,212,232,0.14); background:rgba(200,212,232,0.05);
    color:var(--silver-dim); transition:all 0.15s; white-space:nowrap;
  }
  .zoom-preset:hover { background:rgba(200,212,232,0.10); color:var(--silver); }
  .zoom-preset.active { background:rgba(74,142,202,0.20); border-color:var(--accent); color:var(--ice); }
  .zoom-divider { width:1px; height:22px; background:rgba(200,220,240,0.10); margin:0 4px; }

  /* ══ TILE ZOOM — scales only the right panel cards ══ */
  .panel-right {
    transform-origin: top left;
  }
  #tileZoomWrap {
    flex:1; display:flex; flex-direction:column;
    overflow:hidden; position:relative;
  }
  #tileZoomInner {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding:10px 14px 6px; gap:8px;
    transform-origin: top left;
    transition: transform 0.15s ease;
    width: 100%; height: 100%;
  }

  /* ══ LAYOUT ══ */
  .main { display:flex; flex:1; overflow:hidden; }

  /* ══ LEFT PANEL ══ */
  .panel-left {
    width: 186px; flex-shrink:0;
    border-right:1px solid rgba(200,220,240,0.07);
    display:flex; flex-direction:column;
    background:rgba(7,15,28,0.6);
  }
  .panel-left-header {
    padding:7px 11px 6px;
    border-bottom:1px solid rgba(200,220,240,0.07);
    font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:3px; color:var(--ice-dim);
    flex-shrink:0;
  }
  .startlist-scroll { flex:1; overflow-y:auto; padding:3px 0; }
  .startlist-scroll::-webkit-scrollbar { width:3px; }
  .startlist-scroll::-webkit-scrollbar-thumb { background:rgba(200,212,232,0.12); border-radius:2px; }

  .omloop-header {
    padding: 5px 11px 3px;
    font-family:'Bebas Neue',cursive; font-size:10px; letter-spacing:2px;
    color: rgba(200,220,240,0.35); text-transform:uppercase;
    border-top:1px solid rgba(200,220,240,0.07);
    margin-top:2px;
  }
  .omloop-header:first-child { border-top:none; margin-top:0; }

  .rit-group {
    padding:3px 9px; cursor:pointer;
    border-left:3px solid transparent; transition:background 0.12s;
  }
  .rit-group:hover { background:rgba(200,212,232,0.05); }
  .rit-group.active { background:rgba(74,142,202,0.16); border-left-color:var(--accent); }
  .rit-group.upcoming { background:rgba(74,142,202,0.06); border-left-color:rgba(74,142,202,0.3); }

  .rit-label { display:flex; align-items:center; gap:4px; margin-bottom:2px; }
  .rit-num-badge { font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:1px; color:var(--gold); }
  .gender-badge { font-size:7.5px; padding:1px 3px; border-radius:2px; margin-left:auto; }
  .gender-badge.f { background:rgba(220,80,140,0.16); color:#e080b0; }
  .gender-badge.m { background:rgba(74,142,202,0.16); color:#80b0e8; }

  .rit-riders-compact { display:flex; flex-direction:column; gap:1px; }
  .rider-tiny { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--silver); line-height:1.45; }
  .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .dot.wit  { background:#fff; }
  .dot.rood { background:var(--red-baan); }
  .dot.geel { background:var(--geel-baan); }

  /* ══ RIGHT PANEL ══ */
  .panel-right {
    flex:1; display:flex; flex-direction:column;
    overflow:hidden; min-width:0; position:relative;
  }
  .rit-cards { display:flex; flex-direction:column; gap:8px; flex:1; overflow:hidden; }

  /* ══ RIT CARD ══ */
  .rit-card {
    flex:1; background:var(--navy-card);
    border:1px solid rgba(200,220,240,0.08); border-radius:11px;
    display:flex; flex-direction:column; overflow:hidden; min-height:0;
  }
  .rit-card.current { border-color:rgba(74,142,202,0.38); box-shadow:0 0 24px rgba(74,142,202,0.09); }

  .card-header {
    display:flex; align-items:center; gap:10px;
    padding:7px 14px; border-bottom:1px solid rgba(200,220,240,0.07);
    flex-shrink:0; background:rgba(0,0,0,0.18);
  }
  .card-rit-num { font-family:'Bebas Neue',cursive; font-size:32px; color:var(--gold); line-height:1; min-width:40px; }
  .card-meta { flex:1; display:flex; flex-direction:column; gap:0; }
  .card-tag { font-family:'Bebas Neue',cursive; font-size:10px; letter-spacing:3px; color:var(--accent); }
  .card-sub { font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:2px; color:var(--silver-dim); }
  .omloop-pill {
    margin-left:auto;
    font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:2px;
    padding:3px 10px; border-radius:20px;
    background:rgba(74,142,202,0.14); color:var(--accent);
    border:1px solid rgba(74,142,202,0.25);
  }
  .rit-card.current .omloop-pill { background:rgba(74,142,202,0.22); color:var(--ice); }

  /* ══ RIDER COLUMNS ══ */
  .card-body { display:flex; flex:1; overflow:hidden; min-height:0; }

  .rider-col {
    flex:1; display:flex; flex-direction:column;
    padding:9px 12px 8px;
    border-right:1px solid rgba(200,220,240,0.06);
    overflow-y:auto; min-width:0;
  }
  .rider-col:last-child { border-right:none; }
  .rider-col::-webkit-scrollbar { width:3px; }
  .rider-col::-webkit-scrollbar-thumb { background:rgba(200,212,232,0.10); border-radius:2px; }

  /* Baan indicator */
  .baan-tag { display:flex; align-items:center; gap:6px; margin-bottom:3px; flex-shrink:0; }
  .baan-bar { width:22px; height:3px; border-radius:2px; flex-shrink:0; }
  .baan-bar.wit  { background:#fff; }
  .baan-bar.rood { background:var(--red-baan); }
  .baan-bar.geel { background:var(--geel-baan); }
  .baan-lbl { font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:1.5px; }
  .baan-lbl.wit  { color:rgba(255,255,255,0.55); }
  .baan-lbl.rood { color:var(--red-baan); }
  .baan-lbl.geel { color:var(--geel-baan); }

  /* Rider name */
  .rider-name-full {
    font-family:'Bebas Neue',cursive; font-size:19px; letter-spacing:0.5px;
    color:var(--silver-bright); line-height:1; margin-bottom:7px; flex-shrink:0;
  }

  /* Info items — stacked: label top, value below */
  .info-list { display:flex; flex-direction:column; gap:0; flex:1; min-height:0; }

  .info-item {
    display:flex; flex-direction:column;
    padding: 4px 0;
    border-bottom:1px solid rgba(200,220,240,0.06);
    flex-shrink:0;
  }
  .info-item:last-child { border-bottom:none; }

  .info-lbl {
    font-size:8.5px; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--ice-dim); line-height:1; margin-bottom:2px;
  }
  .info-val {
    font-size:12.5px; color:var(--silver); line-height:1.35;
    word-break:break-word;
  }
  .info-val.hi { color:var(--ice); font-weight:500; }

  .no-info { font-size:11px; color:rgba(200,212,232,0.22); font-style:italic; margin-top:6px; }

  /* KB HINT */
  .kb-hint {
    display:flex; justify-content:center; align-items:center; gap:6px;
    font-size:9px; color:rgba(200,212,232,0.2); letter-spacing:1px;
    flex-shrink:0; padding-bottom:1px;
  }
  .kkey {
    background:rgba(200,212,232,0.06); border:1px solid rgba(200,212,232,0.11);
    border-radius:4px; padding:1px 6px; font-size:10px; color:rgba(200,212,232,0.32);
  }

  /* ══ TIJDEN OMLOOP ══ */
  .tijd-invoer-wrap {
    display: flex; flex-direction: column; gap: 3px;
    margin-bottom: 8px; flex-shrink: 0;
    background: rgba(74,142,202,0.08);
    border: 1px solid rgba(74,142,202,0.22);
    border-radius: 7px; padding: 7px 9px;
  }
  .tijd-invoer-lbl {
    font-size: 8.5px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); opacity: 0.85;
  }
  .tijd-invoer {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(74,142,202,0.3);
    border-radius: 5px; padding: 5px 8px;
    color: var(--ice); font-size: 18px; font-family: 'Bebas Neue', cursive;
    letter-spacing: 2px; width: 100%; outline: none;
    transition: border-color 0.15s;
  }
  .tijd-invoer:focus { border-color: var(--accent); background: rgba(74,142,202,0.10); }
  .tijd-invoer::placeholder { color: rgba(200,220,240,0.2); }

  .tijd-referentie {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; flex-shrink: 0;
    background: rgba(240,192,64,0.08);
    border: 1px solid rgba(240,192,64,0.28);
    border-radius: 7px; padding: 7px 10px;
  }
  .tijd-referentie.leeg {
    background: rgba(200,220,240,0.04);
    border-color: rgba(200,220,240,0.10);
  }
  .tijd-ref-lbl {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); white-space: nowrap; flex-shrink: 0;
  }
  .tijd-referentie.leeg .tijd-ref-lbl { color: var(--ice-dim); }
  .tijd-ref-val {
    font-family: 'Bebas Neue', cursive; font-size: 22px;
    color: var(--gold); letter-spacing: 2px; line-height: 1;
  }
  .tijd-ref-val-leeg {
    font-size: 11px; color: rgba(200,220,240,0.25); font-style: italic;
  }


  /* ══ TIJDEN KNOP ══ */
  .tijden-btn {
    margin-left: 8px;
    padding: 5px 14px; border-radius: 7px; cursor: pointer;
    font-family: 'Bebas Neue', cursive; font-size: 13px; letter-spacing: 2px;
    background: rgba(74,142,202,0.14); border: 1px solid rgba(74,142,202,0.32);
    color: var(--ice); transition: all 0.15s; white-space: nowrap;
  }
  .tijden-btn:hover { background: rgba(74,142,202,0.26); border-color: var(--accent); }

  /* ══ TIJDEN OVERLAY ══ */
  .tijden-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(5,12,24,0.88); backdrop-filter: blur(5px);
    align-items: center; justify-content: center;
  }
  .tijden-overlay.open { display: flex; }

  .tijden-modal {
    background: var(--navy-mid);
    border: 1px solid rgba(200,220,240,0.12);
    border-radius: 14px; overflow: hidden;
    width: 680px; max-width: 95vw; max-height: 88vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .tijden-modal-header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; border-bottom: 1px solid rgba(200,220,240,0.09);
    background: rgba(0,0,0,0.2); flex-shrink: 0;
  }
  .tijden-modal-title {
    font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px;
  }
  .tijden-modal-title span { color: var(--gold); }
  .tijden-modal-sub { font-size: 10px; color: var(--ice-dim); letter-spacing: 1px; }
  .tijden-close {
    margin-left: auto; padding: 5px 14px; border-radius: 6px; cursor: pointer;
    font-family: 'Bebas Neue', cursive; font-size: 12px; letter-spacing: 2px;
    background: rgba(200,220,240,0.07); border: 1px solid rgba(200,220,240,0.16);
    color: var(--silver); transition: all 0.15s;
  }
  .tijden-close:hover { background: rgba(200,220,240,0.14); color: #fff; }

  .tijden-modal-body {
    overflow-y: auto; padding: 16px 20px; display: flex; gap: 24px;
  }
  .tijden-modal-body::-webkit-scrollbar { width: 4px; }
  .tijden-modal-body::-webkit-scrollbar-thumb { background: rgba(200,212,232,0.15); border-radius:2px; }

  .tijden-groep { flex: 1; display: flex; flex-direction: column; gap: 0; }

  .tijden-groep-title {
    font-family: 'Bebas Neue', cursive; font-size: 14px; letter-spacing: 3px;
    color: var(--ice-dim); padding-bottom: 8px; margin-bottom: 4px;
    border-bottom: 1px solid rgba(200,220,240,0.09);
  }
  .tijden-groep-title.m { color: var(--accent); }
  .tijden-groep-title.f { color: #d080b8; }

  .tijden-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 0; border-bottom: 1px solid rgba(200,220,240,0.05);
  }
  .tijden-row:last-child { border-bottom: none; }

  .tijden-naam {
    flex: 1; font-size: 13px; color: var(--silver); min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tijden-input {
    width: 90px; flex-shrink: 0;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(200,220,240,0.14); border-radius: 5px;
    color: var(--ice); font-size: 15px; font-family: 'Bebas Neue', cursive;
    letter-spacing: 2px; padding: 4px 8px; outline: none;
    text-align: center; transition: border-color 0.15s;
  }
  .tijden-input:focus { border-color: var(--accent); background: rgba(74,142,202,0.10); }
  .tijden-input::placeholder { color: rgba(200,220,240,0.18); letter-spacing: 1px; }
  .tijden-input.filled { border-color: rgba(74,142,202,0.35); color: var(--gold); }

</style>
</head>
<body>

<header>
  <div class="logo-circle">DE<br>ZILV<br>BAL</div>
  <div class="header-text">
    <div class="header-title">De <span>Zilveren</span> Bal</div>
    <div class="header-sub">SKA Kids 2026 — Startlijst</div>
  </div>
  <div class="header-nav">
    <span class="nav-hint">RIT</span>
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">&#8592;</button>
    <div class="rit-counter" id="ritCounter">1 / 24</div>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">&#8594;</button>
  </div>
  <button class="tijden-btn" onclick="openTijden()">⏱ TIJDEN OMLOOP 1</button>
  <div class="zoom-group">
    <span class="zoom-label">SCHERM</span>
    <button class="zoom-btn" onclick="changeZoom(-5)">−</button>
    <div class="zoom-pct" id="zoomPct">100%</div>
    <button class="zoom-btn" onclick="changeZoom(+5)">+</button>
    <div class="zoom-presets">
      <button class="zoom-preset" id="zp-small"  onclick="setZoom(75)">13″</button>
      <button class="zoom-preset" id="zp-medium" onclick="setZoom(90)">17″</button>
      <button class="zoom-preset active" id="zp-large"  onclick="setZoom(100)">22″</button>
    </div>
  </div>
  <div class="zoom-divider"></div>
  <div class="zoom-group">
    <span class="zoom-label">TILES</span>
    <button class="zoom-btn" onclick="changeTileZoom(-5)">−</button>
    <div class="zoom-pct" id="tileZoomPct">100%</div>
    <button class="zoom-btn" onclick="changeTileZoom(+5)">+</button>
  </div>
</header>

<div class="main">
  <div class="panel-left">
    <div class="panel-left-header">ALLE RITTEN</div>
    <div class="startlist-scroll" id="startlistScroll"></div>
  </div>
  <div class="panel-right" id="panelRight">
    <div id="tileZoomWrap">
      <div id="tileZoomInner">
        <div class="rit-cards" id="ritCards"></div>
        <div class="kb-hint">
          <span class="kkey">←</span><span>vorige</span>
          <span style="margin:0 3px;opacity:.4">·</span>
          <span class="kkey">→</span><span>volgende rit</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const INFO = {
  "Laura van der Heide": {leeftijd:"9 jaar", schaatsen:"1 jaar", hobbys:"Korfbal", voorbeeld:"Femke Kok", prijzen:"Nee", moment:"Mee doen aan de ska cup", weetje:"Mijn vader was vroeger schaatser"},
  "Alina Yachou": {leeftijd:"9 jaar", schaatsen:"3 jaar", hobbys:"Naar de sportschool met papa", voorbeeld:"Femke kok", prijzen:"2de op de massastart", moment:"Dat ik 2de ben geworden", weetje:"Mijn broertje is mijn grootste fan"},

function riderColHTML(d, omloop) {
  const info = getInfo(d.n);
  const cls = bc(d.b);
  const key = tijdKey(d.n);

  // Omloop 2: toon de opgeslagen tijd bovenaan als referentie
  let tijdBlock = '';
  if (omloop === 2) {
    const omloop1Tijd = tijden[key];
    tijdBlock = omloop1Tijd
      ? `<div class="tijd-referentie">
          <div class="tijd-ref-lbl">⏱ OMLOOP 1</div>
          <div class="tijd-ref-val">${omloop1Tijd}</div>
        </div>`
      : `<div class="tijd-referentie leeg">
          <div class="tijd-ref-lbl">⏱ OMLOOP 1</div>
          <div class="tijd-ref-val-leeg">niet ingevuld</div>
        </div>`;
  }

  let body = '';
  if (info) {
    body = `<div class="info-list">` +
      FIELDS.map(([lbl, key, hi]) =>
        `<div class="info-item">
          <div class="info-lbl">${lbl}</div>
          <div class="info-val${hi?' hi':''}">${info[key]}</div>
        </div>`
      ).join('') +
      `</div>`;
  } else {
    body = `<div class="no-info">Geen extra info beschikbaar</div>`;
  }
  return `
    <div class="rider-col">
      <div class="baan-tag">
        <div class="baan-bar ${cls}"></div>
        <span class="baan-lbl ${cls}">${baanMap[d.b]}</span>
      </div>
      <div class="rider-name-full">${d.n}</div>
      ${tijdBlock}
      ${body}
    </div>`;
}



function cardHTML(r, isCurrent) {
  const cols = r.d.map(d => riderColHTML(d, r.omloop)).join('');
  const gText = r.g === 'F' ? 'MEISJES' : 'JONGENS';
  const oLabel = `OMLOOP ${r.omloop}`;
  return `
    <div class="rit-card${isCurrent?' current':''}">
      <div class="card-header">
        <div class="card-rit-num">${r.rit}</div>
        <div class="card-meta">
          <div class="card-tag">${isCurrent?'HUIDIGE RIT':'VOLGENDE RIT'}</div>
          <div class="card-sub">${gText}</div>
        </div>
        <div class="omloop-pill">${oLabel}</div>
      </div>
      <div class="card-body">${cols}</div>
    </div>`;
}

function renderLeft() {
  let html = '', prevOmloop = null;
  SL.forEach((r, i) => {
    if (r.omloop !== prevOmloop) {
      html += `<div class="omloop-header">OMLOOP ${r.omloop}</div>`;
      prevOmloop = r.omloop;
    }
    const cls = i===cur ? 'rit-group active' : i===cur+1 ? 'rit-group upcoming' : 'rit-group';
    const gb = r.g==='F'
      ? `<span class="gender-badge f">MEI</span>`
      : `<span class="gender-badge m">JON</span>`;
    const riders = r.d.map(d =>
      `<div class="rider-tiny"><div class="dot ${bc(d.b)}"></div>${d.n}</div>`
    ).join('');
    html += `<div class="${cls}" id="ri${i}" onclick="jumpTo(${i})">
      <div class="rit-label"><span class="rit-num-badge">RIT ${r.rit}</span>${gb}</div>
      <div class="rit-riders-compact">${riders}</div>
    </div>`;
  });
  document.getElementById('startlistScroll').innerHTML = html;
}

function renderRight() {
  const c = SL[cur], n = SL[cur+1];
  document.getElementById('ritCards').innerHTML = cardHTML(c,true) + (n ? cardHTML(n,false) : '');
  document.getElementById('ritCounter').textContent = `${c.rit} / ${SL.length}`;
  document.getElementById('btnPrev').disabled = cur===0;
  document.getElementById('btnNext').disabled = cur===SL.length-1;
}

function render() {
  renderLeft(); renderRight();
  document.getElementById(`ri${cur}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function navigate(dir) {
  const n = cur+dir;
  if (n>=0 && n<SL.length) { cur=n; render(); }
}
function jumpTo(i) { cur=i; render(); }

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') navigate(1);
  if (e.key==='ArrowLeft')  navigate(-1);
  if (e.key==='+' || e.key==='=') changeZoom(+5);
  if (e.key==='-') changeZoom(-5);
});

}
function closeTijden() {
  document.getElementById('tijdenOverlay').classList.remove('open');
  // Refresh right panel so omloop-2 references update
  renderRight();
}

function renderTijdenBody() {
  function groepHTML(namen, geslacht) {
    const label = geslacht === 'f' ? '🩷 MEISJES' : '💙 JONGENS';
    const rows = namen.map(naam => {
      const key = tijdKey(naam);
      const val = tijden[key] || '';
      return `<div class="tijden-row">
        <div class="tijden-naam">${naam}</div>
        <input class="tijden-input${val?' filled':''}" type="text"
          placeholder="0.00.00"
          value="${val}"
          oninput="updateTijd('${key}', this)"
          onclick="this.select()"
        />
      </div>`;
    }).join('');
    return `<div class="tijden-groep">
      <div class="tijden-groep-title ${geslacht}">${label}</div>
      ${rows}
    </div>`;
  }
  document.getElementById('tijdenBody').innerHTML =
    groepHTML(MEISJES, 'f') + groepHTML(JONGENS, 'm');
}

function updateTijd(key, input) {
  const val = input.value.trim();
  tijden[key] = val;
  input.classList.toggle('filled', val.length > 0);
  saveTijden();
}

// SCREEN ZOOM (affects entire page incl. left panel)
let zoomLevel = parseInt(localStorage.getItem('zbZoom') || '100');
const ZOOM_PRESETS = [
  { id:'zp-small',  val:75  },
  { id:'zp-medium', val:90  },
  { id:'zp-large',  val:100 },
];
function applyZoom() {
  document.documentElement.style.zoom = zoomLevel + '%';
  document.getElementById('zoomPct').textContent = zoomLevel + '%';
  localStorage.setItem('zbZoom', zoomLevel);
  ZOOM_PRESETS.forEach(p => {
    document.getElementById(p.id).classList.toggle('active', p.val === zoomLevel);
  });
}
function changeZoom(delta) {
  zoomLevel = Math.min(130, Math.max(60, zoomLevel + delta));
  applyZoom();
}
function setZoom(val) {
  zoomLevel = val;
  applyZoom();
}

// TILE ZOOM (affects only the right-panel cards, not the startlist)
let tileZoom = parseInt(localStorage.getItem('zbTileZoom') || '100');
function applyTileZoom() {
  const inner = document.getElementById('tileZoomInner');
  const wrap  = document.getElementById('tileZoomWrap');
  if (!inner || !wrap) return;
  const scale = tileZoom / 100;
  inner.style.transform = `scale(${scale})`;
  // compensate size so scrollbars don't appear
  inner.style.width  = (100 / scale) + '%';
  inner.style.height = (100 / scale) + '%';
  document.getElementById('tileZoomPct').textContent = tileZoom + '%';
  localStorage.setItem('zbTileZoom', tileZoom);
}
function changeTileZoom(delta) {
  tileZoom = Math.min(150, Math.max(60, tileZoom + delta));
  applyTileZoom();
}

applyZoom();
applyTileZoom();
render();
</script>

<!-- TIJDEN OVERLAY -->
<div class="tijden-overlay" id="tijdenOverlay">
  <div class="tijden-modal">
    <div class="tijden-modal-header">
      <div class="tijden-modal-title">⏱ Tijden <span>Omloop 1</span></div>
      <div class="tijden-modal-sub">Vul de tijden in — zichtbaar bij omloop 2</div>
      <button class="tijden-close" onclick="closeTijden()">✕ SLUITEN</button>
    </div>
    <div class="tijden-modal-body" id="tijdenBody"></div>
  </div>
</div>
</body>
</html>
